<div
  class="card mb-3 w-100 shadow"
  [ngClass]="{
    'border-danger border-2': task.priority === 'High',
    'border-warning border-2': task.priority === 'Medium',
    'border-secondary border-2': task.priority === 'Low',
  }"
>
  <div class="row g-0 justify-content-between align-items-center">
    <div class="col-lg-6">
      <div class="card-body">
        <h5
          class="card-title"
          [class.text-decoration-line-through]="task.isCompleted"
        >
          {{ task.title }}
        </h5>
        <p class="card-text">{{ task.description }}</p>
      </div>
    </div>
    <div class="col-lg-auto p-3">
      <div class="d-flex align-items-center justify-content-center gap-4 mb-2">
        <p
          class="card-text m-0 pb-1 ps-2 pe-2 rounded-3 text-light"
          style="background-color: rgba(108, 117, 125, 0.6)"
        >
          <small class="">{{ task.tag }}</small>
        </p>
        <i
          class="bi bi-pencil-fill text-primary"
          type="button"
          (click)="openEditModal()"
        ></i>
        <i
          class="bi bi-trash3-fill text-danger"
          type="button"
          (click)="deleteTask()"
        ></i>
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          [id]="'check-' + task.id"
          [checked]="task.isCompleted"
          (change)="toggleTaskStatus()"
        />
      </div>
      <div class="d-flex align-items-center justify-content-center gap-4">
        <p class="card-text pb-1 ps-2 pe-2 rounded-3 text-light text-sm-center text-muted">
          <small>{{ task.date }}</small>
        </p>
      </div>
    </div>
  </div>
</div>
