<div class="container-fluid">
  <div
    id="carouselID"
    class="carousel carousel-dark slide w-100 mx-auto"
    data-bs-ride="carousel"
    data-bs-interval="2000"
    data-bs-pause="false"
  >
    <div class="carousel-indicators">
      <button
        type="button"
        data-bs-target="#carouselID"
        data-bs-slide-to="0"
        class="active"
        aria-current="true"
        aria-label="Slide 1"
      ></button>
      <button
        type="button"
        data-bs-target="#carouselID"
        data-bs-slide-to="1"
        aria-label="Slide 2"
      ></button>
      <button
        type="button"
        data-bs-target="#carouselID"
        data-bs-slide-to="2"
        aria-label="Slide 3"
      ></button>
      <button
        type="button"
        data-bs-target="#carouselID"
        data-bs-slide-to="3"
        aria-label="Slide 4"
      ></button>
    </div>
    <div class="carousel-inner">
      <div
        class="carousel-item active"
        data-bs-interval="2000"
      >
        <img
          src="assets/todo1.png"
          class="d-block w-100"
          alt="Slide 1"
        />
      </div>
      <div
        class="carousel-item"
        data-bs-interval="2000"
      >
        <img
          src="assets/todo2.png"
          class="d-block w-100"
          alt="Slide 2"
        />
      </div>
      <div
        class="carousel-item"
        data-bs-interval="2000"
      >
        <img
          src="assets/todo3.png"
          class="d-block w-100"
          alt="Slide 3"
        />
      </div>
      <div
        class="carousel-item"
        data-bs-interval="2000"
      >
        <img
          src="assets/todo4.png"
          class="d-block w-100"
          alt="Slide 4"
        />
      </div>
    </div>

    <button
      class="carousel-control-prev"
      type="button"
      data-bs-target="#carouselID"
      data-bs-slide="prev"
    >
      <span
        class="carousel-control-prev-icon"
        aria-hidden="true"
      ></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button
      class="carousel-control-next"
      type="button"
      data-bs-target="#carouselID"
      data-bs-slide="next"
    >
      <span
        class="carousel-control-next-icon"
        aria-hidden="true"
      ></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
