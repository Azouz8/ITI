<div class="app">
    <app-header></app-header>
    <app-carousel></app-carousel>
    <app-notification [notification]="notification" />
    <app-todoForm (sendTaskEvent)="getCard($event)" [task]="taskToBeUpdated"
        (updateTaskEvent)="passTaskToBeUpdated($event)"
        (sendNotificationEvent)="getNotification($event)"></app-todoForm>
    <app-cardList [task]="task" (updateTaskEvent)="passTaskToBeUpdated($event)" (notification)="getNotification($event)"
        [updatedTask]="taskToBeUpdated"></app-cardList>
    <app-footer></app-footer>
</div>
