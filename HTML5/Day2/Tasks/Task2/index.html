<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <svg width="500" height="300">
        <polygon points="150,0 150,270 20,270" style="fill:red;fill-rule:evenodd;"></polygon>
    </svg>

    <label id=a>a</label>
    <label id=b>b</label>
    <label id=c>c</label>
    <h2>According to pythagoras theorem</h2>
    <math>
        <mi>c</mi>
        <mo>=</mo>
        <msqrt>
            <msup>
                <mrow>
                    <mi>a</mi>
                </mrow>
                <mrow>
                    <mn>2</mn>
                </mrow>
            </msup>
            <mo>+</mo>
            <msup>
                <mrow>
                    <mi>b</mi>
                </mrow>
                <mrow>
                    <mn>2</mn>
                </mrow>
            </msup>
        </msqrt>
    </math>
</body>

</html>
